<!-- 
    Página de Contacto.
    Permite a los usuarios comunicarse con el artista para:
    - encargos
    - compra de obras
    - consultas generales
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/contact.css">
    <script type="module" src="../js/main.js"></script>
    <title>Contacto - Javier Revelo</title>
</head>

<body>

    <!-- Header principal del sitio -->
    <my-header theme="dark"></my-header>

    <!-- Hero con título de la página -->
    <my-hero title="Contacto"></my-hero>

    <!-- Sección principal de contacto -->
    <section class="section">
        <div class="container contact_block">
            <p>
                Puedes ponerte en contacto conmigo si te interesa alguna obra de arte original, encargos, consultas o
                simplemente para saludar.
            </p>

            <div class="contact_block__content">
                <!-- 
                    Formulario de contacto
                    Actualmente no está conectado a backend (action="#")
                -->
                <form>
                    <div class="form__row">
                        <div class="form__group">
                            <label for="name">Nombre</label>
                            <input type="text" name="name">
                        </div>

                        <div class="form__group">
                            <label for="last_name">Apellidos</label>
                            <input type="text" name="last_name">
                        </div>
                    </div>

                    <label for="email">Email</label>
                    <input type="email" name="email">

                    <label for="subject">Asunto</label>
                    <input type="text" name="subject">

                    <label for="message">Mensaje</label>
                    <textarea name="message"></textarea>

                    <div class="acceptance">
                        <input type="checkbox" name="privacy_policy" id="privacy_policy">
                        <label for="privacy_policy">He leído y acepto la política de privacidad</label>
                    </div>

                    <input type="submit" value="Enviar">

                </form>
                <!-- Imagen decorativa de la sección -->
                <img src="../assets/images/contact.webp" alt="Imagen de contacto">
            </div>
        </div>
    </section>

    <!-- Elemento decorativo -->
    <img src="../assets/images/galeria/home.webp" class="decor_bubble" alt="Elemento decorativo">

    <!-- Footer reutilizable del sitio -->
    <my-footer></my-footer>

</body>

</html>
